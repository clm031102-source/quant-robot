name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[parquet,reports]"

      - name: Run tests
        env:
          PYTHONPATH: src
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Compile Python
        env:
          PYTHONPATH: src
        run: python -m compileall -q src scripts tests

      - name: Project audit
        env:
          PYTHONPATH: src
        run: |
          python scripts/run_project_audit.py --json > project_audit.json
          python -c "import json, pathlib, sys; audit=json.loads(pathlib.Path('project_audit.json').read_text()); print(json.dumps(audit['summary'], sort_keys=True)); sys.exit(0 if audit['summary']['passes'] else 1)"
